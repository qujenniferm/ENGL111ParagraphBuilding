.appendChild(frame);const opts=document.createElement("div");opts.className="options";shuffle(current.options).forEach(opt=>{const b=document.createElement("button");b.className="sentence pickable";b.textContent=opt;b.onclick=()=>selectSingle(opt,b);opts.appendChild(b)});area.appendChild(opts)}else{const list=document.createElement("div");list.className="sentence-list";shuffle(current.sentences.map((txt,i)=>({txt,i}))).forEach(item=>{const b=document.createElement("button");b.className="sentence pickable";b.textContent=item.txt;b.dataset.originalIndex=item.i;b.onclick=()=>selectSingle(item.i,b);list.appendChild(b)});area.appendChild(list)}}function selectBuild(item,btn){if(locked||btn.classList.contains("selected"))return;selectedOrder.push(item.i);btn.classList.add("selected");btn.textContent=`${selectedOrder.length}. ${item.txt}`;const answer=document.getElementById("answerList");const slot=document.createElement("div");slot.className="answer-slot filled";slot.textContent=`${selectedOrder.length}. ${item.txt}`;answer.appendChild(slot)}function selectSingle(value,btn){if(locked)return;selectedSingle=value;document.querySelectorAll(".sentence").forEach(x=>x.classList.remove("selected"));btn.classList.add("selected")}function checkAnswer(){if(locked)return;let correct=false;if(current.type==="Build"){if(selectedOrder.length!==current.answer.length){showFeedback(false,"Choose all the sentences first.");return}correct=JSON.stringify(selectedOrder)===JSON.stringify(current.answer);markBuild(correct)}else if(current.type==="Missing"){if(selectedSingle===null){showFeedback(false,"Choose an answer first.");return}correct=selectedSingle===current.answer;markOptions(current.answer)}else{if(selectedSingle===null){showFeedback(false,"Choose an answer first.");return}correct=selectedSingle===current.answer;markTopicConclusion(current.answer)}locked=true;if(correct){score++;streak++}else{streak=0}showFeedback(correct);document.getElementById("checkBtn").disabled=true;document.getElementById("nextBtn").disabled=false;updateStats()}function markOptions(answer){document.querySelectorAll(".sentence").forEach(b=>{b.disabled=true;if(b.textContent===answer)b.classList.add("correct");else if(b.classList.contains("selected"))b.classList.add("wrong")})}function markTopicConclusion(answerIndex){document.querySelectorAll(".sentence").forEach(b=>{b.disabled=true;const originalIndex=Number(b.dataset.originalIndex);if(originalIndex===answerIndex)b.classList.add("correct");else if(b.classList.contains("selected"))b.classList.add("wrong")})}function markBuild(correct){const answer=document.getElementById("answerList");answer.innerHTML="";selectedOrder.forEach((idx,pos)=>{const div=document.createElement("div");const expected=current.answer[pos];div.className="sentence "+(idx===expected?"correct":"wrong");const [role,cls]=sentenceRole(idx);div.innerHTML=`<div class="role ${cls}">${role}</div>${pos+1}. ${current.sentences[idx]}`;answer.appendChild(div)});if(!correct){const guide=document.createElement("div");guide.className="feedback show";guide.innerHTML="<strong>Best order:</strong><br>"+current.sentences.map((s,i)=>{const[role,cls]=sentenceRole(i);return`<div style='margin-top:8px'><span class='role ${cls}'>${role}</span> ${i+1}. ${s}</div>`}).join("");answer.appendChild(guide)}document.querySelectorAll("#sourceList .sentence").forEach(b=>b.disabled=true)}function showFeedback(correct,custom){const fb=document.getElementById("feedback");fb.className="feedback show";if(custom){fb.innerHTML=`<strong>Not yet.</strong> ${custom}`;return}fb.innerHTML=correct?`<strong>Correct.</strong> ${current.explanation}`:`<strong>Not quite.</strong> ${current.explanation}<div class="arabic">${current.arabic}</div>`}function finishGame(){if(timer)clearInterval(timer);timer=null;document.getElementById("game").classList.add("hidden");document.getElementById("results").classList.remove("hidden");const pct=asked?Math.round(score/asked*100):0;document.getElementById("resultText").innerHTML=`You answered <strong>${score}</strong> out of <strong>${asked}</strong> correctly. Score: <strong>${pct}%</strong>.`}function backToSetup(){if(timer)clearInterval(timer);document.getElementById("results").classList.add("hidden");document.getElementById("game").classList.add("hidden");document.getElementById("setup").classList.remove("hidden")}
function clearSelection(){
  if(!current || current.type!=="Build") return;
  selectedOrder=[];
  locked=false;
  document.getElementById("checkBtn").disabled=false;
  const source=document.getElementById("sourceList");
  const answer=document.getElementById("answerList");
  if(answer) answer.innerHTML="";
  if(source){
    const items=[...source.querySelectorAll(".sentence")].map(b=>b.textContent.replace(/^\d+\.\s*/,''));
    source.innerHTML="";
    items.forEach(txt=>{
      const b=document.createElement("button");
      b.className="sentence pickable";
      b.textContent=txt;
      b.onclick=()=>selectBuild({txt:txt,i:current.sentences.indexOf(txt)},b);
      source.appendChild(b);
    });
  }
}
